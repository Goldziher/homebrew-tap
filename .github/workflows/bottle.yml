name: Build Bottles

run-name: Bottle ${{ inputs.formula }} ${{ inputs.tag }}

on:
  workflow_dispatch:
    inputs:
      formula:
        description: "Formula name, for example gh-actions-updater"
        required: true
        type: string
      tag:
        description: "Source release tag, for example v0.1.0"
        required: true
        type: string
      release_repo:
        description: "Repository that owns the source GitHub release"
        required: false
        type: string

concurrency:
  group: bottles-${{ inputs.formula }}-${{ inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  HOMEBREW_NO_ANALYTICS: "1"
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"
  HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: "1"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS ARM64
            runner: macos-15
          - name: macOS Intel
            runner: macos-15-intel
          - name: Linux x86_64
            runner: ubuntu-24.04
          - name: Linux ARM64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.HOMEBREW_TOKEN || github.token }}

      - name: Install Homebrew on Linux
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential curl file git procps
          NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
          echo "/home/linuxbrew/.linuxbrew/sbin" >> "$GITHUB_PATH"

      - name: Build bottle
        env:
          FORMULA: ${{ inputs.formula }}
          TAG: ${{ inputs.tag }}
          RELEASE_REPO: ${{ inputs.release_repo }}
          GH_TOKEN: ${{ secrets.HOMEBREW_TOKEN || github.token }}
        run: |
          set -euo pipefail
          if [ -z "$RELEASE_REPO" ]; then
            RELEASE_REPO="Goldziher/${FORMULA}"
          fi
          ROOT_URL="https://github.com/${RELEASE_REPO}/releases/download/${TAG}"

          if [ "$RUNNER_OS" = "Linux" ]; then
            eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          fi

          brew --version
          brew tap goldziher/tap "$GITHUB_WORKSPACE"
          brew install --build-bottle --formula "goldziher/tap/${FORMULA}"
          brew test "goldziher/tap/${FORMULA}"
          brew bottle --json --root-url="$ROOT_URL" "goldziher/tap/${FORMULA}"

          mkdir -p bottle-json
          cp ./*.bottle.json "bottle-json/${FORMULA}-${RUNNER_OS}-${RUNNER_ARCH}.json"
          gh release upload "$TAG" ./*.bottle*.tar.gz --repo "$RELEASE_REPO" --clobber

      - name: Upload bottle JSON
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bottle-json-${{ matrix.name }}
          path: bottle-json/*.json
          if-no-files-found: error

  merge:
    name: Merge bottle block
    runs-on: macos-15
    needs: build
    steps:
      - name: Checkout tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.HOMEBREW_TOKEN || github.token }}

      - name: Download bottle JSON
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: bottle-json-*
          path: bottle-json
          merge-multiple: true

      - name: Merge bottles into formula
        env:
          FORMULA: ${{ inputs.formula }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          brew tap goldziher/tap "$GITHUB_WORKSPACE"
          brew bottle --merge --write --no-commit bottle-json/*.json

          git diff -- "Formula/${FORMULA}.rb"
          if git diff --quiet -- "Formula/${FORMULA}.rb"; then
            echo "Formula/${FORMULA}.rb already contains bottle data for ${TAG}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "Formula/${FORMULA}.rb"
          git commit -m "chore(homebrew): add ${FORMULA} ${TAG} bottles"
          git pull --rebase
          git push
